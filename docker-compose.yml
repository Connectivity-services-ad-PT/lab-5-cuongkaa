services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fit4110/access-gate:v1.0.0-team-gate
    container_name: fit4110-access-gate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      mock-core:
        condition: service_healthy
      mock-analytics:
        condition: service_healthy
    networks:
      - team-internal
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: fit4110-gate-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gatepass}
      POSTGRES_DB: ${POSTGRES_DB:-gatedb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gate} -d ${POSTGRES_DB:-gatedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: fit4110/access-gate-mock:v1.0.0-team-gate
    container_name: fit4110-mock-core
    environment:
      MOCK_ROLE: core
    command: ["uvicorn", "mock_services.main:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "8001"]
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-analytics:
    build:
      context: .
      dockerfile: Dockerfile
    image: fit4110/access-gate-mock:v1.0.0-team-gate
    container_name: fit4110-mock-analytics
    environment:
      MOCK_ROLE: analytics
    command: ["uvicorn", "mock_services.main:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "8002"]
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  team-internal:
    driver: bridge

volumes:
  db-data:
